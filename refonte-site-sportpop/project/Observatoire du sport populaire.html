document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"81fad36d-c6d6-48c8-8343-523a05b4fdfb\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n<style>\n  body{margin:0;background:#F2F4F7;}\n  a{text-decoration:none;}\n  ::selection{background:#FE4575;color:#fff;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#F2F4F7;color:#2B2B2B;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n\n  <!-- NAV -->\n  <nav style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:16px 48px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.08);flex-wrap:wrap;\">\n    <a href=\"#\" onclick=\"{{ goAccueil }}\" style=\"display:flex;align-items:center;gap:12px;line-height:1.15;cursor:pointer;\">\n      <img src=\"https://sportpop.ch/wp-content/uploads/2022/02/sans-titre-2-1.png\" alt=\"Logo Observatoire du sport populaire\" style=\"width:38px;height:38px;object-fit:contain;\">\n      <span style=\"display:flex;flex-direction:column;\">\n        <span style=\"font-weight:700;font-size:17px;color:#34495E;letter-spacing:.2px;\">Observatoire<\u002Fspan>\n        <span style=\"font-weight:300;font-size:12px;color:#2B2B2B;letter-spacing:.3px;\">du sport populaire<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:flex;align-items:center;gap:36px;flex-wrap:wrap;\">\n      <a href=\"#\" onclick=\"{{ goAccueil }}\" style=\"{{ navStyles.accueil }}\">Accueil<\u002Fa>\n      <a href=\"#\" onclick=\"{{ goEquipe }}\" style=\"{{ navStyles.equipe }}\">L'équipe<\u002Fa>\n      <a href=\"#\" onclick=\"{{ goProjets }}\" style=\"{{ navStyles.projets }}\">Projets<\u002Fa>\n      <a href=\"#\" onclick=\"{{ goContact }}\" style=\"{{ navStyles.contact }}\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ================= ACCUEIL ================= -->\n  <sc-if value=\"{{ isAccueil }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <!-- HERO -->\n      <section style=\"position:relative;overflow:hidden;\">\n        <div style=\"position:absolute;top:-180px;right:-140px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle at 50% 50%, rgba(254,69,117,.08), rgba(254,69,117,0) 70%);pointer-events:none;\"><\u002Fdiv>\n        <div style=\"max-width:1200px;margin:0 auto;padding:104px 48px 88px;display:flex;align-items:center;gap:64px;flex-wrap:wrap;position:relative;\">\n          <div style=\"flex:1 1 480px;min-width:320px;\">\n            <div style=\"display:inline-flex;align-items:center;gap:10px;font-weight:400;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#FE4575;margin-bottom:26px;padding:7px 14px;border:1px solid rgba(254,69,117,.35);border-radius:999px;\">\n              <span style=\"width:6px;height:6px;border-radius:50%;background:#FE4575;display:inline-block;\"><\u002Fspan>Association scientifique · Suisse romande\n            <\u002Fdiv>\n            <h1 style=\"font-weight:700;font-size:66px;line-height:1.04;letter-spacing:-1.5px;color:#34495E;margin:0 0 26px;\">Observatoire<br>du sport <span style=\"color:#FE4575;\">populaire<\u002Fspan><\u002Fh1>\n            <p style=\"font-weight:400;font-size:21px;line-height:1.55;color:#2B2B2B;max-width:520px;margin:0 0 18px;\">Les sciences sociales au service du sport.<\u002Fp>\n            <p style=\"font-weight:300;font-size:16px;line-height:1.75;color:rgba(43,43,43,.72);max-width:540px;margin:0 0 16px;\">L'Observatoire conseille les actrices et acteurs du sport et les collectivités publiques, et les accompagne face aux changements sociaux par une approche scientifique — celle des sciences sociales.<\u002Fp>\n            <p style=\"font-weight:300;font-size:16px;line-height:1.75;color:rgba(43,43,43,.72);max-width:540px;margin:0 0 38px;\">Vulgarisation de la littérature scientifique, enquêtes de terrain, formations, rédaction de documents stratégiques&nbsp;: nous transformons la recherche en outils concrets pour les organisations sportives et les pouvoirs publics de Suisse romande.<\u002Fp>\n            <div style=\"display:flex;gap:16px;flex-wrap:wrap;\">\n              <a href=\"https://sportpop.ch/wp-content/uploads/2024/03/Statuts_v4.pdf\" target=\"_blank\" style=\"padding:15px 30px;border-radius:999px;background:#34495E;color:#fff;font-weight:500;font-size:14px;transition:transform .2s ease, box-shadow .2s ease, background .2s ease;\" style-hover=\"padding:15px 30px;border-radius:999px;background:#FE4575;color:#fff;font-weight:500;font-size:14px;transform:translateY(-2px);box-shadow:0 8px 20px rgba(254,69,117,.3);\">Statuts<\u002Fa>\n              <a href=\"https://sportpop.ch/wp-content/uploads/2026/06/Rapport-OSP-2025.pdf\" target=\"_blank\" style=\"padding:15px 30px;border-radius:999px;background:transparent;color:#34495E;font-weight:500;font-size:14px;border:1.5px solid #34495E;transition:background .2s ease, color .2s ease;\" style-hover=\"padding:15px 30px;border-radius:999px;background:#34495E;color:#fff;font-weight:500;font-size:14px;border:1.5px solid #34495E;\">Rapport 2025<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 320px;min-width:280px;display:flex;justify-content:center;\">\n            <div style=\"position:relative;width:360px;height:360px;display:flex;align-items:center;justify-content:center;\">\n              <div style=\"position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(52,73,94,.14);\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:26px;border-radius:50%;border:1.5px dashed rgba(254,69,117,.35);\"><\u002Fdiv>\n              <div style=\"width:250px;height:250px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #ffffff, #F2F4F7);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 50px rgba(52,73,94,.12);\">\n                <img src=\"https://sportpop.ch/wp-content/uploads/2022/02/sans-titre-2-1.png\" alt=\"Logo Observatoire du sport populaire\" style=\"width:190px;height:190px;object-fit:contain;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- STATS BAND -->\n        <div style=\"max-width:1200px;margin:0 auto;padding:0 48px 40px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:24px;border-top:1px solid rgba(52,73,94,.12);padding-top:36px;\">\n            <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1 1 200px;min-width:160px;\">\n                <div style=\"font-weight:700;font-size:40px;letter-spacing:-1px;color:#34495E;\">{{ s.value }}<\u002Fdiv>\n                <div style=\"font-weight:300;font-size:14px;line-height:1.5;color:rgba(43,43,43,.65);margin-top:4px;\">{{ s.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- DOMAINES D'ACTION -->\n      <section style=\"background:#34495E;padding:80px 48px;\">\n        <div style=\"max-width:1200px;margin:0 auto;\">\n          <h2 style=\"font-weight:700;font-size:32px;color:#fff;margin:0 0 16px;\">Domaines d'action prioritaires<\u002Fh2>\n          <p style=\"font-weight:300;font-size:16px;line-height:1.7;color:rgba(255,255,255,.7);max-width:640px;margin:0 0 48px;\">Trois axes structurent l'ensemble de nos mandats et de nos recherches, du terrain associatif jusqu'aux politiques publiques cantonales.<\u002Fp>\n          <div style=\"display:flex;gap:40px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ domains }}\" as=\"d\" hint-placeholder-count=\"3\">\n              <div style=\"flex:1 1 280px;min-width:240px;\">\n                <div style=\"font-weight:700;font-size:44px;color:#FE4575;margin-bottom:14px;\">{{ d.n }}<\u002Fdiv>\n                <div style=\"font-weight:500;font-size:20px;color:#fff;margin-bottom:12px;\">{{ d.title }}<\u002Fdiv>\n                <div style=\"font-weight:300;font-size:15px;line-height:1.65;color:rgba(255,255,255,.75);\">{{ d.body }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- COMITÉ (preview) -->\n      <section style=\"max-width:1200px;margin:0 auto;padding:88px 48px 40px;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:44px;\">\n          <h2 style=\"font-weight:700;font-size:32px;color:#34495E;margin:0;\">Comité et secrétariat général<\u002Fh2>\n          <a href=\"#\" onclick=\"{{ goEquipe }}\" style=\"font-weight:500;font-size:14px;color:#FE4575;\">Voir toute l'équipe →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:28px;\">\n          <sc-for list=\"{{ comitePreview }}\" as=\"m\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .25s ease, box-shadow .25s ease;\" style-hover=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 16px 34px rgba(52,73,94,.16);transform:translateY(-5px);transition:transform .25s ease, box-shadow .25s ease;\">\n              <img src=\"{{ m.photo }}\" style=\"width:100%;aspect-ratio:1/1;object-fit:cover;display:block;\">\n              <div style=\"padding:18px 20px 22px;\">\n                <div style=\"font-weight:700;font-size:16px;color:#2B2B2B;\">{{ m.name }}<\u002Fdiv>\n                <div style=\"font-weight:400;font-size:12.5px;color:#FE4575;margin-top:3px;\">{{ m.role }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- MANIFESTE -->\n      <section style=\"padding:20px 48px 40px;\">\n        <div style=\"max-width:960px;margin:0 auto;\">\n          <div style=\"font-weight:700;font-size:64px;line-height:1;color:#FE4575;height:36px;\">«<\u002Fdiv>\n          <p style=\"font-weight:300;font-size:30px;line-height:1.4;letter-spacing:-.3px;color:#34495E;margin:0 0 20px;\">Le sport n'est jamais neutre. Comprendre qui le pratique, qui en est exclu et pour quelles raisons, c'est déjà agir pour un sport plus inclusif, plus intègre et mieux gouverné.<\u002Fp>\n          <div style=\"font-weight:400;font-size:14px;color:rgba(43,43,43,.6);\">— L'Observatoire du sport populaire<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- NOTRE VISION -->\n      <section style=\"max-width:1200px;margin:0 auto;padding:60px 48px 88px;\">\n        <h2 style=\"font-weight:700;font-size:32px;color:#34495E;margin:0 0 20px;\">Notre vision<\u002Fh2>\n        <p style=\"font-weight:300;font-size:16px;line-height:1.7;color:rgba(43,43,43,.75);max-width:640px;margin:0 0 48px;\">Cinq principes guident chacun de nos mandats, de la première enquête de terrain jusqu'à la restitution aux autorités et aux organisations sportives.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:36px;\">\n          <sc-for list=\"{{ vision }}\" as=\"v\" hint-placeholder-count=\"5\">\n            <div>\n              <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\" style=\"margin-bottom:18px;\">\n                <sc-if value=\"{{ v.isPin }}\">\n                  <circle cx=\"20\" cy=\"16\" r=\"10\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                  <path d=\"M20 26 L20 37\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <circle cx=\"20\" cy=\"16\" r=\"3.5\" fill=\"#FE4575\"><\u002Fcircle>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ v.isCap }}\">\n                  <polygon points=\"20,6 37,15 20,24 3,15\" stroke=\"#FE4575\" strokewidth=\"2\" strokelinejoin=\"round\"><\u002Fpolygon>\n                  <path d=\"M11,18.5 L11,27 C11,30 29,30 29,27 L29,18.5\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ v.isTarget }}\">\n                  <circle cx=\"20\" cy=\"20\" r=\"15\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                  <circle cx=\"20\" cy=\"20\" r=\"9\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                  <circle cx=\"20\" cy=\"20\" r=\"3\" fill=\"#FE4575\"><\u002Fcircle>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ v.isNetwork }}\">\n                  <circle cx=\"9\" cy=\"10\" r=\"5\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                  <circle cx=\"31\" cy=\"10\" r=\"5\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                  <circle cx=\"20\" cy=\"32\" r=\"5\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                  <path d=\"M12.5,13.5 L17,28\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <path d=\"M27.5,13.5 L23,28\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <path d=\"M14,10 L26,10\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ v.isBox }}\">\n                  <polygon points=\"20,4 36,12 36,28 20,36 4,28 4,12\" stroke=\"#FE4575\" strokewidth=\"2\" strokelinejoin=\"round\"><\u002Fpolygon>\n                  <path d=\"M4,12 L20,20 L36,12\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <path d=\"M20,20 L20,36\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                <\u002Fsc-if>\n              <\u002Fsvg>\n              <div style=\"font-weight:300;font-size:15px;line-height:1.6;color:#2B2B2B;\">{{ v.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= EQUIPE ================= -->\n  <sc-if value=\"{{ isEquipe }}\">\n    <div>\n      <section style=\"max-width:1200px;margin:0 auto;padding:72px 48px 24px;\">\n        <div style=\"font-weight:300;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#FE4575;margin-bottom:14px;\">L'équipe<\u002Fdiv>\n        <h1 style=\"font-weight:700;font-size:42px;color:#34495E;margin:0 0 16px;\">Comité, secrétariat général &amp; collaborateur·rices<\u002Fh1>\n        <p style=\"font-weight:300;font-size:16px;line-height:1.65;color:rgba(43,43,43,.75);max-width:640px;\">Une équipe pluridisciplinaire de chercheuses et chercheurs — sociologie, science politique, santé publique, genre — réunie autour d'une même conviction&nbsp;: les sciences sociales ont un rôle décisif à jouer dans la conception des politiques sportives de demain.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"max-width:1200px;margin:0 auto;padding:32px 48px 24px;\">\n        <h2 style=\"font-weight:500;font-size:22px;color:#34495E;margin:0 0 32px;\">Comité et secrétariat général<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:28px;\">\n          <sc-for list=\"{{ comite }}\" as=\"m\" hint-placeholder-count=\"9\">\n            <div style=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;transition:transform .25s ease, box-shadow .25s ease;\" style-hover=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 16px 34px rgba(52,73,94,.16);display:flex;flex-direction:column;transform:translateY(-5px);transition:transform .25s ease, box-shadow .25s ease;\">\n              <img src=\"{{ m.photo }}\" style=\"width:100%;aspect-ratio:1/1;object-fit:cover;display:block;\">\n              <div style=\"padding:18px 20px 22px;flex:1;display:flex;flex-direction:column;\">\n                <div style=\"font-weight:700;font-size:16px;color:#2B2B2B;\">{{ m.name }}<\u002Fdiv>\n                <div style=\"font-weight:400;font-size:12.5px;color:#FE4575;margin-top:3px;\">{{ m.role }}<\u002Fdiv>\n                <div style=\"font-weight:300;font-size:13px;line-height:1.5;color:rgba(43,43,43,.65);margin-top:10px;flex:1;\">{{ m.tag }}<\u002Fdiv>\n                <div style=\"display:flex;gap:14px;margin-top:14px;\">\n                  <sc-if value=\"{{ m.linkedin }}\">\n                    <a href=\"{{ m.linkedin }}\" target=\"_blank\" style=\"font-size:12px;font-weight:500;color:#34495E;\">LinkedIn<\u002Fa>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ m.mail }}\">\n                    <a href=\"{{ m.mailLink }}\" style=\"font-size:12px;font-weight:500;color:#34495E;\">E-mail<\u002Fa>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"max-width:1200px;margin:0 auto;padding:56px 48px 96px;\">\n        <h2 style=\"font-weight:500;font-size:22px;color:#34495E;margin:0 0 32px;\">Collaborateur·rices<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:28px;\">\n          <sc-for list=\"{{ collabs }}\" as=\"m\" hint-placeholder-count=\"7\">\n            <div style=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;transition:transform .25s ease, box-shadow .25s ease;\" style-hover=\"background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 16px 34px rgba(52,73,94,.16);display:flex;flex-direction:column;transform:translateY(-5px);transition:transform .25s ease, box-shadow .25s ease;\">\n              <img src=\"{{ m.photo }}\" style=\"width:100%;aspect-ratio:1/1;object-fit:cover;display:block;\">\n              <div style=\"padding:18px 20px 22px;flex:1;display:flex;flex-direction:column;\">\n                <div style=\"font-weight:700;font-size:16px;color:#2B2B2B;\">{{ m.name }}<\u002Fdiv>\n                <div style=\"font-weight:400;font-size:12.5px;color:#FE4575;margin-top:3px;\">{{ m.role }}<\u002Fdiv>\n                <div style=\"font-weight:300;font-size:13px;line-height:1.5;color:rgba(43,43,43,.65);margin-top:10px;flex:1;\">{{ m.tag }}<\u002Fdiv>\n                <sc-if value=\"{{ m.linkedin }}\">\n                  <a href=\"{{ m.linkedin }}\" target=\"_blank\" style=\"font-size:12px;font-weight:500;color:#34495E;margin-top:14px;display:inline-block;\">LinkedIn<\u002Fa>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= PROJETS ================= -->\n  <sc-if value=\"{{ isProjets }}\">\n    <div>\n      <section style=\"max-width:1200px;margin:0 auto;padding:72px 48px 24px;\">\n        <div style=\"font-weight:300;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#FE4575;margin-bottom:14px;\">Projets<\u002Fdiv>\n        <h1 style=\"font-weight:700;font-size:42px;color:#34495E;margin:0 0 16px;\">Quelques projets<\u002Fh1>\n        <p style=\"font-weight:300;font-size:16px;line-height:1.65;color:rgba(43,43,43,.75);max-width:640px;\">Enquêtes, formations, politiques publiques et rapports scientifiques menés par l'Observatoire.<\u002Fp>\n      <\u002Fsection>\n      <section style=\"max-width:1200px;margin:0 auto;padding:24px 48px 96px;\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;\">\n          <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"8\">\n            <a href=\"{{ p.url }}\" target=\"_blank\" style=\"display:block;background:#fff;border-radius:14px;padding:28px 26px;box-shadow:0 1px 3px rgba(0,0,0,.06);color:#2B2B2B;transition:transform .25s ease, box-shadow .25s ease;border:1px solid transparent;\" style-hover=\"display:block;background:#fff;border-radius:14px;padding:28px 26px;box-shadow:0 16px 34px rgba(52,73,94,.16);color:#2B2B2B;transform:translateY(-5px);transition:transform .25s ease, box-shadow .25s ease;border:1px solid rgba(254,69,117,.3);\">\n              <svg width=\"34\" height=\"34\" viewBox=\"0 0 34 34\" fill=\"none\" style=\"margin-bottom:18px;\">\n                <sc-if value=\"{{ p.isReport }}\">\n                  <rect x=\"7\" y=\"4\" width=\"20\" height=\"26\" rx=\"2\" stroke=\"#34495E\" strokewidth=\"2\"><\u002Frect>\n                  <path d=\"M12,12 L22,12\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <path d=\"M12,17 L22,17\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <path d=\"M12,22 L18,22\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ p.isPolicy }}\">\n                  <path d=\"M5,30 L29,30\" stroke=\"#34495E\" strokewidth=\"2\"><\u002Fpath>\n                  <path d=\"M8,30 L8,15 L17,7 L26,15 L26,30\" stroke=\"#34495E\" strokewidth=\"2\" strokelinejoin=\"round\"><\u002Fpath>\n                  <path d=\"M17,30 L17,21 L14,21 L14,30\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ p.isSurvey }}\">\n                  <rect x=\"7\" y=\"4\" width=\"20\" height=\"26\" rx=\"2\" stroke=\"#34495E\" strokewidth=\"2\"><\u002Frect>\n                  <path d=\"M11.5,12 L14,14.5 L19,9.5\" stroke=\"#FE4575\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><\u002Fpath>\n                  <path d=\"M11.5,20 L14,22.5 L19,17.5\" stroke=\"#FE4575\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><\u002Fpath>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ p.isTraining }}\">\n                  <polygon points=\"17,5 30,12 17,19 4,12\" stroke=\"#34495E\" strokewidth=\"2\" strokelinejoin=\"round\"><\u002Fpolygon>\n                  <path d=\"M9,15 L9,22 C9,24.5 25,24.5 25,22 L25,15\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ p.isInclusion }}\">\n                  <circle cx=\"13\" cy=\"14\" r=\"7\" stroke=\"#34495E\" strokewidth=\"2\"><\u002Fcircle>\n                  <circle cx=\"21\" cy=\"14\" r=\"7\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fcircle>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ p.isShield }}\">\n                  <path d=\"M17,4 L28,8.5 L28,17 C28,24 22,28.5 17,30 C12,28.5 6,24 6,17 L6,8.5 Z\" stroke=\"#34495E\" strokewidth=\"2\" strokelinejoin=\"round\"><\u002Fpath>\n                  <path d=\"M17,12 L17,19\" stroke=\"#FE4575\" strokewidth=\"2\"><\u002Fpath>\n                  <circle cx=\"17\" cy=\"23\" r=\"1.4\" fill=\"#FE4575\"><\u002Fcircle>\n                <\u002Fsc-if>\n              <\u002Fsvg>\n              <div style=\"font-weight:700;font-size:17px;color:#34495E;margin-bottom:8px;\">{{ p.title }}<\u002Fdiv>\n              <div style=\"font-weight:300;font-size:13.5px;line-height:1.55;color:rgba(43,43,43,.65);margin-bottom:16px;\">{{ p.desc }}<\u002Fdiv>\n              <div style=\"font-weight:400;font-size:13px;color:#FE4575;\">En savoir plus →<\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= CONTACT ================= -->\n  <sc-if value=\"{{ isContact }}\">\n    <section style=\"max-width:1200px;margin:0 auto;padding:72px 48px 120px;display:flex;gap:64px;flex-wrap:wrap;\">\n      <div style=\"flex:1 1 380px;min-width:300px;\">\n        <div style=\"font-weight:300;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#FE4575;margin-bottom:14px;\">Contact<\u002Fdiv>\n        <h1 style=\"font-weight:700;font-size:42px;color:#34495E;margin:0 0 24px;\">Parlons de votre projet<\u002Fh1>\n        <p style=\"font-weight:300;font-size:16px;line-height:1.7;color:rgba(43,43,43,.75);max-width:440px;margin:0 0 32px;\">Une question, un mandat, une envie de collaborer ? Écrivez-nous, l'équipe vous répond rapidement.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <a href=\"mailto:info@sportpop.ch\" style=\"font-weight:500;font-size:16px;color:#34495E;\">info@sportpop.ch<\u002Fa>\n          <a href=\"https://www.linkedin.com/company/observatoire-du-sport-populaire\" target=\"_blank\" style=\"font-weight:500;font-size:16px;color:#34495E;\">LinkedIn<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 420px;min-width:320px;\">\n        <sc-if value=\"{{ contactSent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border-radius:14px;padding:40px;box-shadow:0 1px 3px rgba(0,0,0,.06);\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#FE4575;margin-bottom:20px;\"><\u002Fdiv>\n            <div style=\"font-weight:700;font-size:20px;color:#34495E;margin-bottom:10px;\">Message envoyé<\u002Fdiv>\n            <div style=\"font-weight:300;font-size:15px;color:rgba(43,43,43,.7);line-height:1.6;\">Merci, nous revenons vers vous très prochainement.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ contactNotSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ handleContactSubmit }}\" style=\"background:#fff;border-radius:14px;padding:36px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:18px;\">\n            <div>\n              <label style=\"display:block;font-weight:500;font-size:13px;color:#34495E;margin-bottom:6px;\">Nom<\u002Flabel>\n              <input required=\"true\" value=\"{{ contactName }}\" onchange=\"{{ setName }}\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border-radius:8px;border:1px solid rgba(0,0,0,.15);font-size:14px;font-family:inherit;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-weight:500;font-size:13px;color:#34495E;margin-bottom:6px;\">E-mail<\u002Flabel>\n              <input required=\"true\" type=\"email\" value=\"{{ contactEmail }}\" onchange=\"{{ setEmail }}\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border-radius:8px;border:1px solid rgba(0,0,0,.15);font-size:14px;font-family:inherit;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-weight:500;font-size:13px;color:#34495E;margin-bottom:6px;\">Message<\u002Flabel>\n              <textarea required=\"true\" value=\"{{ contactMsg }}\" onchange=\"{{ setMsg }}\" rows=\"4\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border-radius:8px;border:1px solid rgba(0,0,0,.15);font-size:14px;font-family:inherit;resize:vertical;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"margin-top:6px;padding:14px 28px;border-radius:999px;background:#FE4575;color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer;\">Envoyer<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#34495E;padding:64px 48px 40px;\">\n    <div style=\"max-width:1200px;margin:0 auto;display:flex;gap:64px;flex-wrap:wrap;justify-content:space-between;\">\n      <div style=\"flex:1 1 280px;min-width:240px;\">\n        <img src=\"https://sportpop.ch/wp-content/uploads/2022/02/sans-titre-2-1.png\" alt=\"Logo Observatoire du sport populaire\" style=\"width:52px;height:52px;object-fit:contain;margin-bottom:18px;\">\n        <div style=\"font-weight:700;font-size:16px;color:#fff;margin-bottom:14px;\">À propos<\u002Fdiv>\n        <div style=\"font-weight:300;font-size:14px;line-height:1.7;color:rgba(255,255,255,.7);max-width:340px;\">L'Observatoire du sport populaire est une association de droit suisse, à but non lucratif, fondée à Lausanne en 2022. Elle réunit des chercheuses et chercheurs en sciences sociales autour d'une mission commune&nbsp;: mettre la rigueur scientifique au service du sport et de celles et ceux qui le font vivre.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 220px;min-width:200px;\">\n        <div style=\"font-weight:700;font-size:16px;color:#fff;margin-bottom:14px;\">Contactez-nous<\u002Fdiv>\n        <a href=\"mailto:info@sportpop.ch\" style=\"display:block;font-weight:300;font-size:14px;color:rgba(255,255,255,.7);margin-bottom:8px;\">info@sportpop.ch<\u002Fa>\n        <a href=\"https://www.linkedin.com/company/observatoire-du-sport-populaire\" target=\"_blank\" style=\"display:block;font-weight:300;font-size:14px;color:rgba(255,255,255,.7);\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 220px;min-width:200px;\">\n        <div style=\"font-weight:700;font-size:16px;color:#fff;margin-bottom:14px;\">Avec le soutien de<\u002Fdiv>\n        <img src=\"https://sportpop.ch/wp-content/uploads/2024/02/logo_infomaniak_blanc-1.png\" style=\"height:24px;opacity:.85;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:40px auto 0;padding-top:24px;border-top:1px solid rgba(255,255,255,.12);font-weight:300;font-size:12px;color:rgba(255,255,255,.45);\">© 2026 Observatoire du sport populaire<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    page: 'accueil',\n    contactSent: false,\n    contactName: '',\n    contactEmail: '',\n    contactMsg: ''\n  };\n\n  comite = [\n    { name: 'Dre Solène Froidevaux', role: 'Présidente', tag: 'Genre, corps et sport', photo: 'https://sportpop.ch/wp-content/uploads/2022/10/solene_1_min.jpg', linkedin: 'https://www.linkedin.com/in/sol%C3%A8ne-froidevaux-39780685/?originalSubdomain=ch', mail: 'solene.froidevaux@sportpop.ch' },\n    { name: 'Dr. Kevin Rosianu', role: 'Vice-président', tag: 'Migrations, racisme, prévention des violences', photo: 'https://sportpop.ch/wp-content/uploads/2025/05/f0447b10-e1d1-42e2-a797-d8a5ca1bde62-1024x1024.jpg', mail: 'kevin.rosianu@sportpop.ch' },\n    { name: 'Dr. Quentin Tonnerre', role: 'Vice-président et trésorier', tag: 'Politiques publiques du sport et évaluation', photo: 'https://0c3ywbgcrn.preview.infomaniak.website/wp-content/uploads/2022/10/sfrv2020_17-copie.jpg', linkedin: 'https://www.linkedin.com/in/quentin-tonnerre-phd-043a9273/', mail: 'quentin.tonnerre@sportpop.ch' },\n    { name: 'Dr. Jérôme Berthoud', role: 'Membre du comité', tag: 'Diversité culturelle et prévention des violences', photo: 'https://sportpop.ch/wp-content/uploads/2022/10/jeromeberthoud18-copie.jpg', linkedin: 'https://www.linkedin.com/in/j%C3%A9r%C3%B4me-berthoud-phd-0816bb142/', mail: 'jerome.berthoud@sportpop.ch' },\n    { name: 'Carole Gomez', role: 'Membre du comité', tag: 'Géopolitique, genre, violences sexistes et sexuelles', photo: 'https://sportpop.ch/wp-content/uploads/2025/05/3121c8fa-0029-40f5-b83c-5c3db4e4fd5b.jpg', linkedin: 'https://www.linkedin.com/in/carole-gomez-aa687036' },\n    { name: 'Dre Justine Scheidegger', role: 'Membre du comité', tag: 'Corps, espace public, inclusion', photo: 'https://sportpop.ch/wp-content/uploads/2025/05/bb78ab56-6399-4365-a082-c6f9bbd0d1fe-1024x1024.jpg', linkedin: 'https://applicationspub.unil.ch/interpub/noauth/php/Un/UnPers.php?PerNum=1135057&LanCode=37' },\n    { name: 'Dre Jennifer Masset', role: 'Membre du comité (HESAV)', tag: 'Développement et évaluation de programmes', photo: 'https://sportpop.ch/wp-content/uploads/2025/04/4b8693a7-7589-4aac-8963-85dd81ee6383-768x1024.jpg', linkedin: 'https://www.linkedin.com/in/jennifer-wegrzyk-masset-a13599b0/' },\n    { name: 'Alexis Valenza', role: 'Secrétaire général', tag: 'Durabilité, pilotage du sport', photo: 'https://sportpop.ch/wp-content/uploads/2024/02/Alexis-copie.png', linkedin: 'https://www.linkedin.com/in/iamalexisvalenza/', mail: 'alexis.valenza@sportpop.ch' },\n    { name: 'Dre Emilie Jaccard', role: 'Membre du comité', tag: 'Politique publique, tourisme sportif, marketing', photo: 'https://sportpop.ch/wp-content/uploads/2025/05/cb266c43-12d0-4960-a26c-fc34ad5dc62d-1024x1024.jpg', linkedin: 'https://www.linkedin.com/in/emilie-jaccard-7b315130/' }\n  ];\n\n  collabs = [\n    { name: 'Dr. Philippe Vonnard', role: 'Coordinateur scientifique', tag: 'Responsable du Pôle Enquêtes', photo: 'https://sportpop.ch/wp-content/uploads/2026/05/Phil-copie.jpeg', linkedin: 'https://www.linkedin.com/in/philippe-vonnard-078755113/?originalSubdomain=ch' },\n    { name: 'Dr. Dietrich Choffat', role: 'Responsable pédagogique', tag: \"Formation d'animateur·trices sportif·ves communautaires\", photo: 'https://sportpop.ch/wp-content/uploads/2024/02/Photo_Dietrich_Choffat-copie-1.png', linkedin: 'https://www.linkedin.com/in/dietrich-choffat-8683b8261/' },\n    { name: 'Diana Lisette Garcia Gonzalez', role: 'Coordinatrice de projet', tag: \"Formation d'animateur·trices sportif·ves communautaires\", photo: 'https://sportpop.ch/wp-content/uploads/2024/04/1652216401643-copie.jpeg', linkedin: 'https://www.linkedin.com/in/diana-lisette-garcia-gonzalez/' },\n    { name: 'Dre Esther Eustache', role: 'Chargée de projet', tag: 'Rapport « Tabac & Sport »', photo: 'https://sportpop.ch/wp-content/uploads/2025/08/photo_Eustache-1-Modifie-Modifie-709x1024.jpg', linkedin: 'https://www.linkedin.com/in/esther-eustache-767498113/' },\n    { name: 'Dr. Bastien Presset', role: 'Chef de projet', tag: \"Rapport « Tabac & Sport » et Enquête pratiques sportives libres\", photo: 'https://sportpop.ch/wp-content/uploads/2022/11/presset_photo.jpg', linkedin: 'https://www.linkedin.com/in/bastien-presset-phd-648408106/' },\n    { name: 'Manon Pesse', role: 'Chargée de projet', tag: 'Évaluation SPARK', photo: 'https://sportpop.ch/wp-content/uploads/2026/04/ManonPesse-copie.jpg', linkedin: 'https://www.linkedin.com/in/manon-pesse-2030ab31a/?originalSubdomain=ch' },\n    { name: 'Dr. Kevin Rosianu', role: 'Chef de projet', tag: \"Rapport espaces d'activité physique communaux\", photo: 'https://sportpop.ch/wp-content/uploads/2025/05/f0447b10-e1d1-42e2-a797-d8a5ca1bde62.jpg' }\n  ];\n\n  stats = [\n    { value: '2022', label: 'Association fondée à Lausanne' },\n    { value: '15+', label: 'Chercheuses et chercheurs' },\n    { value: '8', label: 'Projets et rapports publiés' },\n    { value: 'CH-VD·GE', label: 'Ancrage en Suisse romande' }\n  ];\n\n  domains = [\n    { n: '1', title: 'Inclusion', body: \"Favoriser l'accès à la pratique sportive sans distinction de genre, âge, parcours migratoire, classe sociale ou handicap.\" },\n    { n: '2', title: 'Intégrité', body: \"Prévenir toute forme d'abus dans le cadre de la pratique sportive, notamment envers les enfants et les personnes les plus vulnérables.\" },\n    { n: '3', title: 'Politiques publiques', body: \"Accompagner les collectivités publiques dans le développement des politiques du sport et de l'activité physique.\" }\n  ];\n\n  vision = [\n    { text: 'Un ancrage local en Suisse romande', isPin: true },\n    { text: \"Des études menées par des professionnel·les avec un haut niveau de formation\", isCap: true },\n    { text: 'Des projets sur mesure pour les organisations sportives et les autorités publiques', isTarget: true },\n    { text: 'Un travail en co-construction avec les partenaires des projets et un important réseau académique', isNetwork: true },\n    { text: 'Des produits livrés clé en main pour servir les politiques publiques et celles des organisations sportives', isBox: true }\n  ];\n\n  projects = [\n    { title: 'Sport et nicotine', desc: 'Enquête sur la consommation de tabac et de nicotine dans les milieux sportifs.', url: 'https://www.unisante.ch/fr/formation-recherche/recherche/publications/raisons-sante/raisons-sante-376', isReport: true },\n    { title: \"Élaboration d'une politique sportive communale\", desc: \"Accompagnement stratégique d'une collectivité publique dans la définition de sa politique sportive.\", url: 'https://www.lausanneregion.ch/publications-2021-2026/', isPolicy: true },\n    { title: 'Pratiques sportives à Genève', desc: 'Enquête quantitative sur les pratiques sportives de la population du canton de Genève.', url: 'https://www.ge.ch/document/enquete-pratiques-sportives-population-du-canton-geneve', isSurvey: true },\n    { title: 'Formation en animation sportive communautaire', desc: \"Programme de formation destiné aux animateur·trices sportif·ves de terrain.\", url: 'https://sportpop.ch/28-2/', isTraining: true },\n    { title: 'Quel sport demain ?', desc: 'Étude prospective sur les mutations des pratiques sportives dans les prochaines décennies.', url: 'https://sportpop.ch/quel-sport-demain/', isSurvey: true },\n    { title: 'Sport et inclusion', desc: \"Recherche-action sur l'accès à la pratique sportive pour les publics vulnérables.\", url: 'https://sportpop.ch/sport-et-inclusion/', isInclusion: true },\n    { title: 'Violences dans le sport', desc: 'État des lieux des violences dans les milieux sportifs genevois.', url: 'https://sportsge.ch/wp-content/uploads/2024/08/AGS_Violences-dans-les-millieux-sportifs_Etat-lieux-1.pdf', isShield: true },\n    { title: 'Dispositif maltraitance', desc: 'Rapport d\\'enquête pour la création d\\'un dispositif cantonal de lutte contre les maltraitances dans le sport.', url: 'https://sportpop.ch/wp-content/uploads/2025/06/Rapport-denquete_Creation-dun-dispositif-cantonal-de-lutte-contre-les-maltraitances-et-les-mauvais-comportements-dans-le-sport-2023.pdf', isShield: true }\n  ];\n\n  navigate = (page) => (e) => { if (e && e.preventDefault) e.preventDefault(); this.setState({ page }); };\n\n  handleContactSubmit = (e) => {\n    e.preventDefault();\n    this.setState({ contactSent: true });\n  };\n\n  setField = (field) => (e) => this.setState({ [field]: e.target.value });\n\n  renderVals() {\n    const { page } = this.state;\n    const activeStyle = { fontWeight: 600, fontSize: '14px', color: '#FE4575', borderBottom: '2px solid #FE4575', paddingBottom: '4px', cursor: 'pointer' };\n    const inactiveStyle = { fontWeight: 400, fontSize: '14px', color: '#2B2B2B', borderBottom: '2px solid transparent', paddingBottom: '4px', cursor: 'pointer' };\n\n    const comite = this.comite.map(m => ({ ...m, mailLink: m.mail ? ('mailto:' + m.mail) : null }));\n\n    return {\n      goAccueil: this.navigate('accueil'),\n      goEquipe: this.navigate('equipe'),\n      goProjets: this.navigate('projets'),\n      goContact: this.navigate('contact'),\n      isAccueil: page === 'accueil',\n      isEquipe: page === 'equipe',\n      isProjets: page === 'projets',\n      isContact: page === 'contact',\n      navStyles: {\n        accueil: page === 'accueil' ? activeStyle : inactiveStyle,\n        equipe: page === 'equipe' ? activeStyle : inactiveStyle,\n        projets: page === 'projets' ? activeStyle : inactiveStyle,\n        contact: page === 'contact' ? activeStyle : inactiveStyle\n      },\n      domains: this.domains,\n      vision: this.vision,\n      comite: comite,\n      comitePreview: comite.slice(0, 4),\n      collabs: this.collabs,\n      projects: this.projects,\n      contactSent: this.state.contactSent,\n      contactNotSent: !this.state.contactSent,\n      contactName: this.state.contactName,\n      contactEmail: this.state.contactEmail,\n      contactMsg: this.state.contactMsg,\n      setName: this.setField('contactName'),\n      setEmail: this.setField('contactEmail'),\n      setMsg: this.setField('contactMsg'),\n      handleContactSubmit: this.handleContactSubmit\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
